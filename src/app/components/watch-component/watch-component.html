<div class="watch-card">
  
  <div class="clock-section">
    <span class="label">Текущо време</span>
    <h1 class="clock-display">{{ currentTime$ | async | date:'HH:mm:ss' }}</h1>
  </div>

  <div class="divider"></div>

  <div class="settings-section">
    <div class="input-group">
      <label>Подготовка (сек):</label>
      <input type="number" [(ngModel)]="prepareTimeInput" (ngModelChange)="updateDefaultDisplay()" [disabled]="isResultShown" min="0" max="60">
    </div>
    <div class="input-group">
      <label>Таймер (мин):</label>
      <input type="number" [(ngModel)]="mainTimeInput" (ngModelChange)="updateDefaultDisplay()" [disabled]="isResultShown" min="1" max="60">
    </div>
  </div>

  <div class="divider"></div>

  <div class="timer-section">
    <span class="label">
      {{ isPreparing ? 'Приготви се...' : (isPaused ? 'На Пауза' : 'Обратно броене') }}
    </span>
    
    <h2 class="timer-display" [class.preparing]="isPreparing" [class.paused]="isPaused">
      {{ displayValue }}
    </h2>
    
    <div class="controls-container">
      
      <button *ngIf="!isResultShown || isPaused" class="btn btn-start" (click)="startTimer()">
        {{ isPaused ? 'Продължи' : 'Старт' }}
      </button>

      <button *ngIf="isResultShown && !isPaused" class="btn btn-pause" (click)="pauseTimer()">
        Пауза
      </button>

      <button *ngIf="isResultShown" class="btn btn-stop" (click)="stopTimer()">
        Стоп
      </button>

      <button *ngIf="isResultShown" class="btn btn-restart" (click)="restartTimer()">
        Рестарт
      </button>

    </div>
  </div>

</div>
