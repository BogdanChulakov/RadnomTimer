<div class="watch-card">
  
  <div class="clock-section">
    <span class="label">Текущо време</span>
    <h1 class="clock-display">{{ currentTime$ | async | date:'HH:mm:ss' }}</h1>
  </div>

  <div class="divider"></div>

  <div class="settings-grid">
    <div class="input-group">
      <label>Подготовка (сек):</label>
      <input type="number" [(ngModel)]="prepareTimeInput" (ngModelChange)="updateDefaultDisplay()" [disabled]="isResultShown" min="0">
    </div>
    <div class="input-group">
      <label>Таймер (минути):</label>
      <input type="number" [(ngModel)]="mainTimeInput" (ngModelChange)="updateDefaultDisplay()" [disabled]="isResultShown" min="1">
    </div>
    <div class="input-group">
      <label>Рундове (брой):</label>
      <input type="number" [(ngModel)]="roundsInput" [disabled]="isResultShown" min="1">
    </div>
    <div class="input-group">
      <label>Почивка (секунди):</label>
      <input type="number" [(ngModel)]="restTimeInput" [disabled]="isResultShown" min="0">
    </div>
    <div class="input-group">
      <label>Рандом сигнал (макс. сек):</label>
      <input type="number" [(ngModel)]="randomSignalMaxInput" [disabled]="isResultShown" min="0">
    </div>
  </div>

  <div class="commands-section">
    <span class="section-label">Избери сигнали за рунда (избери няколко):</span>
    <div class="commands-grid">
      <div 
        *ngFor="let cmd of availableCommands" 
        class="command-chip" 
        [class.selected]="cmd.selected" 
        [class.disabled]="isResultShown"
        (click)="toggleCommand(cmd)">
        <span class="chip-checkbox"></span>
        <span class="chip-text">{{ cmd.label }}</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="timer-section">
    <span class="label">
      {{ isPreparing ? 'Приготви се...' : (isResting ? 'ПОЧИВКА!' : 'РУНД ' + currentRound) }}
    </span>
    
    <h2 class="timer-display" 
        [class.preparing]="isPreparing" 
        [class.resting]="isResting" 
        [class.paused]="isPaused">
      {{ displayValue }}
    </h2>

    <div class="rounds-indicator" *ngIf="isResultShown">
      Рунд: {{ currentRound }} / {{ roundsInput }}
    </div>
    
    <div class="controls-container">
      <button *ngIf="!isResultShown || isPaused" class="btn btn-start" (click)="startTimer()">
        {{ isPaused ? 'Продължи' : 'Старт' }}
      </button>

      <button *ngIf="isResultShown && !isPaused" class="btn btn-pause" (click)="pauseTimer()">
        Пауза
      </button>

      <button *ngIf="isResultShown" class="btn btn-stop" (click)="stopTimer()">
        Стоп
      </button>

      <button *ngIf="isResultShown" class="btn btn-restart" (click)="restartTimer()">
        Рестарт
      </button>
    </div>
  </div>

</div>
